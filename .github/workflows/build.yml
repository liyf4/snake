name: Build Cross-Platform

on: [push, pull_request]

jobs:
  build:
    # 矩阵设置：同时跑两个系统
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: 检查代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt

    - name: 打包程序 (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name SnakeGame_Windows main.py

    - name: 打包程序 (MacOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --onefile --windowed --name SnakeGame_MacOS main.py

    - name: 上传成果
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGame-${{ matrix.os }}
        path: |
          dist/*.exe
          dist/*.app
          dist/*.zip
