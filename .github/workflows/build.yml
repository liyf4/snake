name: Build for macOS

on: [push, pull_request]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: 检查代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 匹配您项目当前使用的 Python 版本

    - name: 安装依赖
      run: |
        pip install -r requirements.txt

    - name: 开始打包 (PyInstaller)
      run: |
        # 使用 snake.py 作为主程序名，并设置输出名称为 SnakeGame_v1.0_macOS
        pyinstaller --noconsole --onefile --windowed --name SnakeGame_v1.0_macOS snake.py

    - name: 上传打包好的文件
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGame-MacOS
        path: dist/SnakeGame_v1.0_macOS.app
